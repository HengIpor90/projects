name: Python Payments Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'payments/**' # Run តែពេលកែកូដក្នុង folder payments

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./payments # កំណត់ឱ្យ run command ក្នុង folder payments

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # អ្នកអាចប្ដូរតាម version ដែលអ្នកប្រើ

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Tests
        run: |
          # ប្រសិនបើអ្នកមាន file test (ឧទាហរណ៍ test_api.py)
          python -m pytest